<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西游记 - 儿童故事</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'ZCOOL KuaiLe', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #ecf0f1;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container { max-width: 700px; margin: 0 auto; padding: 20px; padding-top: 80px; }
        .header {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.8); padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }
        .logo { font-size: 1.5rem; color: #f39c12; text-decoration: none; }
        .menu-btn { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }
        .cover { text-align: center; padding: 100px 20px; }
        .cover h1 { font-size: 3rem; color: #f39c12; margin-bottom: 20px; }
        .cover-img { font-size: 80px; margin: 30px 0; animation: bounce 2s infinite; }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
        .start-btn {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white; padding: 15px 40px; border-radius: 50px;
            font-size: 1.2rem; border: none; cursor: pointer;
            box-shadow: 0 10px 30px rgba(231,76,60,0.4);
        }
        .chapter { display: none; }
        .chapter.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .chapter h2 { color: #f39c12; text-align: center; margin-bottom: 20px; }
        .chapter-img { font-size: 50px; text-align: center; margin: 20px 0; }
        .story { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 15px; line-height: 1.8; }
        .story p { margin-bottom: 15px; text-indent: 2em; }
        .nav { 
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.8); padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav button {
            background: rgba(255,255,255,0.2); border: none; color: #fff;
            padding: 10px 20px; border-radius: 20px; cursor: pointer;
        }
        .nav button:disabled { opacity: 0.3; }
        .nav button:hover:not(:disabled) { background: #e74c3c; }
        .sidebar {
            position: fixed; top: 0; right: -300px; width: 300px; height: 100vh;
            background: rgba(0,0,0,0.95); z-index: 200; overflow-y: auto;
            transition: right 0.3s; padding-top: 60px;
        }
        .sidebar.active { right: 0; }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 150;
            opacity: 0; visibility: hidden; transition: 0.3s;
        }
        .overlay.active { opacity: 1; visibility: visible; }
        .chapter-list { list-style: none; padding: 10px; }
        .chapter-list li {
            padding: 12px; margin: 5px 0; background: rgba(255,255,255,0.1);
            border-radius: 8px; cursor: pointer;
        }
        .chapter-list li:hover { background: #e74c3c; }
        .loading { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex; justify-content: center; align-items: center;
            z-index: 500; font-size: 2rem;
        }
        .loading.hidden { display: none; }
        @media (max-width: 600px) {
            .cover h1 { font-size: 2rem; }
            .story { padding: 15px; font-size: 0.95rem; }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">🐵 加载中...</div>
    
    <header class="header">
        <a href="#" class="logo" onclick="showCover()">🏠 西游记</a>
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    </header>
    
    <div class="overlay" onclick="toggleSidebar()"></div>
    <aside class="sidebar" id="sidebar">
        <ul class="chapter-list" id="chapterList"></ul>
    </aside>
    
    <div class="container">
        <div class="cover" id="cover">
            <h1>🐒 西游记</h1>
            <p>儿童经典故事</p>
            <div class="cover-img">🏰</div>
            <p>九九八十一难<br>西天取经传奇</p>
            <br>
            <button class="start-btn" onclick="startReading()">开始阅读 📖</button>
        </div>
        
        <div id="chapterContent"></div>
    </div>
    
    <nav class="nav" id="nav" style="display:none;">
        <button id="prevBtn" onclick="prevChapter()">← 上一章</button>
        <span id="indicator">1/81</span>
        <button id="nextBtn" onclick="nextChapter()">下一章 →</button>
    </nav>

    <script src="js/chapters.min.js"></script>
</body>
</html>
