<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西游记 - 儿童故事</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e74c3c;
            --secondary: #f39c12;
            --accent: #27ae60;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Serif SC', serif;
            background: var(--bg-gradient);
            color: var(--light);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* 动态背景 */
        .clouds {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        
        .cloud {
            position: absolute;
            font-size: 3rem;
            opacity: 0.3;
            animation: float 20s infinite linear;
        }
        
        @keyframes float {
            from { transform: translateX(-100px); }
            to { transform: translateX(calc(100vw + 100px)); }
        }
        
        /* 顶部导航 */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 1.5rem;
            color: var(--secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .menu-btn {
            background: none;
            border: none;
            color: var(--light);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }
        
        /* 侧边菜单 */
        .sidebar {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100vh;
            background: rgba(0,0,0,0.95);
            z-index: 200;
            transition: right 0.3s ease;
            padding-top: 80px;
            overflow-y: auto;
        }
        
        .sidebar.active {
            right: 0;
        }
        
        .sidebar-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--light);
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .chapter-list {
            list-style: none;
            padding: 0 15px;
        }
        
        .chapter-list li {
            padding: 15px;
            margin: 5px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chapter-list li:hover, .chapter-list li.active {
            background: var(--primary);
            transform: translateX(-5px);
        }
        
        .chapter-num {
            width: 30px;
            height: 30px;
            background: var(--secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--dark);
            flex-shrink: 0;
        }
        
        /* 遮罩层 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 150;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        
        .overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        /* 主内容区 */
        .main-content {
            position: relative;
            z-index: 1;
            padding: 100px 20px 120px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* 封面 */
        .cover {
            text-align: center;
            max-width: 600px;
            animation: fadeIn 1s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .cover-title {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 3rem;
            color: var(--secondary);
            margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
        }
        
        .cover-subtitle {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 30px;
        }
        
        .cover-img {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .start-btn {
            display: inline-block;
            padding: 15px 50px;
            background: linear-gradient(135deg, var(--primary), #c0392b);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }
        
        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(231, 76, 60, 0.5);
        }
        
        /* 章节内容 */
        .chapter-content {
            display: none;
            max-width: 700px;
            width: 100%;
            animation: slideIn 0.5s ease;
        }
        
        .chapter-content.active {
            display: block;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .chapter-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .chapter-title {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 2rem;
            color: var(--secondary);
            margin-bottom: 10px;
        }
        
        .chapter-meta {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }
        
        .chapter-image {
            margin: 20px 0;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .chapter-image img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }
        
        .chapter-emoji {
            font-size: 80px;
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border-radius: 20px;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .story-text {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            line-height: 2;
            font-size: 1.1rem;
            text-align: justify;
        }
        
        .story-text p {
            margin-bottom: 20px;
            text-indent: 2em;
        }
        
        .story-text p:first-child {
            text-indent: 0;
        }
        
        .story-text p:first-child::first-letter {
            font-size: 2.5em;
            float: left;
            margin-right: 10px;
            line-height: 1;
            color: var(--secondary);
            font-family: 'ZCOOL KuaiLe', cursive;
        }
        
        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 100%);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        
        .nav-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: var(--light);
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        
        .nav-btn:hover:not(:disabled) {
            background: var(--primary);
        }
        
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        
        .progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: var(--secondary);
            transition: width 0.3s ease;
            z-index: 300;
        }
        
        /* 人物介绍弹窗 */
        .character-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            padding: 30px;
            border-radius: 20px;
            z-index: 250;
            max-width: 90%;
            width: 350px;
            text-align: center;
            border: 2px solid var(--secondary);
        }
        
        .character-modal.active {
            display: block;
            animation: popIn 0.3s ease;
        }
        
        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        .character-avatar {
            font-size: 4rem;
            margin-bottom: 15px;
        }
        
        .character-name {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 1.5rem;
            color: var(--secondary);
            margin-bottom: 10px;
        }
        
        .character-desc {
            color: rgba(255,255,255,0.8);
            line-height: 1.6;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .cover-title {
                font-size: 2.2rem;
            }
            
            .story-text {
                padding: 20px;
                font-size: 1rem;
            }
            
            .chapter-title {
                font-size: 1.5rem;
            }
            
            .bottom-nav {
                padding: 15px;
            }
            
            .nav-btn {
                padding: 10px 18px;
                font-size: 0.9rem;
            }
        }
        
        /* 加载动画 */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 500;
            transition: opacity 0.5s ease;
        }
        
        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-spinner {
            font-size: 3rem;
            animation: spin 1s infinite linear;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 加载动画 -->
    <div class="loading" id="loading">
        <div class="loading-spinner">🐵</div>
    </div>
    
    <!-- 进度条 -->
    <div class="progress" id="progress"></div>
    
    <!-- 动态云朵 -->
    <div class="clouds">
        <div class="cloud" style="top: 10%; animation-delay: 0s;">☁️</div>
        <div class="cloud" style="top: 30%; animation-delay: -5s;">☁️</div>
        <div class="cloud" style="top: 50%; animation-delay: -10s;">☁️</div>
        <div class="cloud" style="top: 70%; animation-delay: -15s;">☁️</div>
    </div>
    
    <!-- 顶部导航 -->
    <header class="header">
        <a href="#" class="logo" onclick="showCover()">
            <span>🐵</span>
            <span>西游记</span>
        </a>
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    </header>
    
    <!-- 侧边菜单 -->
    <div class="overlay" onclick="toggleSidebar()"></div>
    <aside class="sidebar" id="sidebar">
        <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
        <h3 style="padding: 15px; color: var(--secondary);">📖 章节目录</h3>
        <ul class="chapter-list" id="chapterList"></ul>
    </aside>
    
    <!-- 人物介绍弹窗 -->
    <div class="character-modal" id="characterModal" onclick="closeCharacter()">
        <div class="character-avatar" id="charAvatar">🐵</div>
        <div class="character-name" id="charName">孙悟空</div>
        <div class="character-desc" id="charDesc">齐天大圣</div>
    </div>
    
    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 封面 -->
        <div class="cover" id="cover">
            <h1 class="cover-title">🐒 西游记</h1>
            <p class="cover-subtitle">儿童经典故事</p>
            <div class="cover-img">🏰</div>
            <p style="margin: 20px 0; color: rgba(255,255,255,0.8);">
                讲述唐僧师徒四人西天取经的传奇故事<br>
                孙悟空、猪八戒、沙僧、白龙马<br>
                一路上降妖除魔，历经九九八十一难
            </p>
            <button class="start-btn" onclick="startReading()">开始阅读 📖</button>
        </div>
        
        <!-- 章节内容容器 -->
        <div id="chapterContainer"></div>
    </main>
    
    <!-- 底部导航 -->
    <nav class="bottom-nav" id="bottomNav" style="display: none;">
        <button class="nav-btn" id="prevBtn" onclick="prevChapter()">
            ← 上一章
        </button>
        <span id="chapterIndicator" style="color: rgba(255,255,255,0.7);">1 / 10</span>
        <button class="nav-btn" id="nextBtn" onclick="nextChapter()">
            下一章 →
        </button>
    </nav>

    <script>
        // 西游记章节数据
        const chapters = [
            {
                title: "第一回",
                subtitle: "灵根孕育源流出",
                image: "🐒",
                content: `<p>很久很久以前，天地还没有分开，整个世界就像一个大鸡蛋，混沌一片。</p>
                <p>在这个大鸡蛋里，孕育着一个巨人，他的名字叫盘古。盘古在大鸡蛋里整整睡了一万八千年，终于有一天，他醒来了。</p>
                <p>盘古醒来后，发现眼前一片漆黑，什么都看不见。他心里非常生气，于是拿起一把大斧头，使出全身力气，向黑暗砍去。</p>
                <p>"咔嚓——"一声巨响，大鸡蛋被砍开了！</p>
                <p>那些清亮的东西，慢慢地往上升，变成了天；那些浑浊的东西，慢慢地往下沉，变成了地。</p>
                <p>盘古怕天和地还会合在一起，就用自己的头顶着天，脚踩着地，站在天地之间。</p>
                <p>随着天每天升高一丈，地每天加厚一丈，盘古的身体也每天长高一丈，就这样过了一万八千年，天已经非常高，地已经非常厚，而盘古也变成了一位顶天立地的巨人。</p>
                <p>盘古死后，他的身体变成了世界万物：眼睛变成太阳和月亮，血液变成江河湖海，汗毛变成花草树木……</p>
                <p>世界形成了，分为了四大部洲：东胜神州、西牛贺洲、南瞻部洲、北俱芦洲。</p>
                <p>在东胜神州，有一个国家叫"傲来国"。这个国家靠近大海，海边有一座山，名叫"花果山"。这座山非常高非常大，山上长满了奇花异草，四季如春，果实累累。</p>
                <p>花果山的山顶上，有一块巨大的仙石。这块仙石高三丈六尺五寸，周长二丈四尺。奇怪的是，这块石头上有九窍八孔，按九宫八卦排列。</p>
                <p>这块仙石吸取了天地的灵气，日月的精华，天长日久，竟然孕育出了一只石猴！</p>
                <p>有一天，这只石猴忽然从石头里蹦了出来，"轰"的一声，石头裂开，石猴跳了出来。</p>
                <p>石猴出生后，就会爬会走。他的眼睛里射出两道金光，一直射到天宫上，连玉皇大帝都被惊动了！</p>
                <p>玉皇大帝赶紧召集神仙们开会："下界有一只石猴出生了，眼睛里射出金光，这是怎么回事呀？"太白金星站出来说："陛下不用担心，这是天地精华孕育的猴子，等他吃了凡间的食物，金光就会消失了。"</p>
                <p>玉皇大帝听了，点点头，就没有去管石猴了。</p>
                <p>石猴出生后，就在花果山里生活。他和山上的猴子们交上了朋友，一起玩耍，一起寻找食物。</p>
                <p>有一天，天气非常热，石猴和猴子们来到山涧边玩水。突然，一只猴子提议说："谁能跳进水帘洞，我们就拜他为王！"原来，山背后有一个瀑布，瀑布后面有一个山洞，看起来很神秘。</p>
                <p>石猴听了，自告奋勇地跳了出来："让我来！"他深吸一口气，纵身一跳，跃过了瀑布，进入了水帘洞。</p>
                <p>洞里非常漂亮，有石床、石桌、石椅，还有各种奇形怪状的石头。石猴在里面玩了一会儿，又跳了出来。</p>
                <p>猴子们看到石猴安全出来，都围上来问："里面怎么样？有没有危险？"石猴笑着说："里面可漂亮了！还有各种好玩的东西呢！"</p>
                <p>猴子们听了，都很开心。于是他们一起跳进水帘洞，在里面安居乐业。</p>
                <p>猴子们把石猴推举为大王，称他为"美猴王"。美猴王从此开始了他在花果山的快乐生活。</p>
                <p>可是，有一天，美猴王忽然闷闷不乐，流下了眼泪。猴子们都很奇怪，问："大王，您怎么哭了？"</p>
                <p>美猴王说："我们虽然在这里很快乐，但是将来有一天，我们会变老，会死去。阎王爷会来勾我们的魂魄，带我们去阴间。这样的日子，有什么意思呢？"</p>
                <p>猴子们听了，也都悲伤起来。</p>
                <p>这时候，一只通背猿猴站出来说："大王，据说世界上有三种人可以长生不老：一种是佛，一种是仙，一种是神。他们都不归阎王爷管，能够长生不老！"</p>
                <p>美猴王听了，眼睛一亮："太好了！我要出海去寻找神仙，学到长生不老的法术！"</p>
                <p>于是，美猴王告别了猴子猴孙，独自一人，乘坐木筏，漂洋过海，去寻找神仙。这一去，也不知道能不能找到神仙，能不能学到法术……</p>
                <p>美猴王历尽艰辛，先后在南瞻部洲和西牛贺洲寻访了整整八九年，都没有找到神仙。</p>
                <p>有一天，他来到西海边上的一座高山。这座山叫"灵台方寸山"，山上有座道观，叫"斜月三星洞"。</p>
                <p>美猴王走进道观，看见一位老神仙正在给徒弟们讲道。这位老神仙就是菩提祖师，是一位法力无边的佛道双修的神仙。</p>
                <p>菩提祖师看见美猴王，问："你是从哪里来的？"美猴王跪下磕头，说："我是从东胜神州傲来国花果山来的。我想拜您为师，学习长生不老的法术！"</p>
                <p>菩提祖师看美猴王虽然样子丑陋，但很有诚心，就收他为徒，给他取了个名字，叫"孙悟空"。</p>
                <p>从此，孙悟空就在斜月三星洞，开始了他的学艺生涯……</p>
                <p>欲知后事如何，请听下回分解。</p>`
            },
            {
                title: "第二回",
                subtitle: "悟彻菩提真妙理",
                image: "🏔️",
                content: `<p>话说美猴王离别了花果山，独自一人驾着木筏，在大海里漂泊。风浪很大，但是美猴王不怕困难，坚持向前航行。</p>

                content: `<p>比丘国南极老人坐骑白鹿精迷惑国王，要用小儿心肝做药引。</p><p>悟空揭露真相，南极老人收服白鹿。</p>`
            },
            {
                title: "第六十七回",
                subtitle: "陷空山",
                content: `<p>陷空山无底洞老鼠精是托塔天王干女儿，抓唐僧逼婚。</p><p>悟空告到天庭，李天王收服老鼠精。</p>`
            },
            {
                title: "第六十八回",
                subtitle: "灭法国",
                content: `<p>灭法国国王灭佛杀僧。</p><p>悟空用法术让君臣都变成光头，国王醒悟皈依佛门。</p>`
            },
            {
                title: "第六十九回",
                subtitle: "隐雾山",
                content: `<p>隐雾山豹子精用分瓣梅花计抓走唐僧。</p><p>悟空设计打死豹子精，救出师父。</p>`
            },
            {
                title: "第七十回",
                subtitle: "凤仙郡",
                content: `<p>凤仙郡三年干旱。</p><p>悟空查明是郡守冒犯玉帝。求雨成功，百姓欢腾。</p>`
            },
            {
                title: "第七十一回",
                subtitle: "玉华州",
                content: `<p>玉华州王子拜师学艺。</p><p>黄狮精偷走宝贝兵器，悟空收回并收伏九灵元圣。</p>`
            },
            {
                title: "第七十二回",
                subtitle: "金平府",
                content: `<p>金平府元宵灯会，三只犀牛精偷油。</p><p>悟空请四木禽星收服犀牛精。</p>`
            },
            {
                title: "第七十三回",
                subtitle: "天竺国",
                content: `<p>天竺国公主抛绣球招亲唐僧。</p><p>玉兔精假扮公主，嫦娥收服玉兔。</p>`
            },
            {
                title: "第七十四回",
                subtitle: "铜台府",
                content: `<p>铜台府寇员外被盗贼所杀，徒弟误告师徒。</p><p>悟空查明真相，救活寇员外。</p>`
            },
            {
                title: "第七十五回",
                subtitle: "回大唐",
                content: `<p>取经功成，师徒返回大唐。</p><p>唐太宗设宴款待，举国欢庆。</p>`
            },
            {
                title: "第七十六回",
                subtitle: "通天河",
                content: `<p>老鼋驮师徒过河，因唐僧忘记承诺问题，老鼋生气翻船。</p>`
            },
            {
                title: "第七十七回",
                subtitle: "湿经书",
                content: `<p>经书落水湿透，师徒在岸边晾晒经书。</p><p>这是取经最后一难。</p>`
            },
            {
                title: "第七十八回",
                subtitle: "无字经",
                content: `<p>阿傩伽叶给无字经书。</p><p>悟空发现后返回灵山换取有字真经。</p>`
            },
            {
                title: "第七十九回",
                subtitle: "再受难",
                content: `<p>取经返回路上再遇妖怪，师徒协力降服。</p><p>继续返回大唐。</p>`
            },
            {
                title: "第八十回",
                subtitle: "金刚送",
                content: `<p>八大金刚护送取经团队返回大唐。</p><p>经书完整送达。</p>`
            },
            {
                title: "第八十一回",
                subtitle: "成正果",
                content: `<p>如来论功行赏：唐僧成旃檀功德佛，悟空成斗战胜佛，八戒成净坛使者，沙僧成金身罗汉，白龙马成八部天龙。</p>
                <p>取经大业圆满完成！</p>
                <p style="text-align: center; font-size: 1.5em; color: var(--secondary); margin-top: 30px;">🎊 西游记全文完 🎊</p>`
            }
        ];
        
        // 人物数据
        const characters = {
            '孙悟空': { avatar: '🐵', desc: '齐天大圣，火眼金睛，七十二变，一个筋斗十万八千里' },
            '猪八戒': { avatar: '🐷', desc: '天蓬元帅错投猪胎，性格懒惰但可爱' },
            '沙僧': { avatar: '🧔', desc: '卷帘大将忠厚老实，任劳任怨' },
            '唐僧': { avatar: '👨‍�', desc: '金蝉子转世，取经人，肉眼凡胎但善良' },
            '白龙马': { avatar: '🐴', desc: '西海龙王三太子，驼负唐僧西行' }
        };
        
        let currentChapter = 0;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initChapterList();
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 500);
        });
        
        // 初始化章节列表
        function initChapterList() {
            const list = document.getElementById('chapterList');
            chapters.forEach((ch, i) => {
                const li = document.createElement('li');
                li.innerHTML = `<span class="chapter-num">${i + 1}</span>${ch.title}`;
                li.onclick = () => goToChapter(i);
                list.appendChild(li);
            });
        }
        
        // 显示封面
        function showCover() {
            document.getElementById('cover').style.display = 'block';
            document.getElementById('chapterContainer').innerHTML = '';
            document.getElementById('bottomNav').style.display = 'none';
            updateProgress(0);
            currentChapter = 0;
            toggleSidebar();
        }
        
        // 开始阅读
        function startReading() {
            currentChapter = 0;
            showChapter(0);
        }
        
        // 跳转到指定章节
        function goToChapter(index) {
            toggleSidebar();
            showChapter(index);
        }
        
        // 显示章节
        function showChapter(index) {
            if (index < 0 || index >= chapters.length) return;
            
            currentChapter = index;
            
            // 隐藏封面，显示章节
            document.getElementById('cover').style.display = 'none';
            
            // 创建章节内容
            const container = document.getElementById('chapterContainer');
            container.innerHTML = '';
            
            const ch = chapters[index];
            const chapterDiv = document.createElement('div');
            chapterDiv.className = 'chapter-content active';
            const imageHtml = ch.image ? `<div class="chapter-emoji">${ch.image}</div>` : '';
            chapterDiv.innerHTML = `
                <div class="chapter-header">
                    <h2 class="chapter-title">${ch.title} ${ch.subtitle}</h2>
                    <p class="chapter-meta">第 ${index + 1} 章，共 ${chapters.length} 章</p>
                </div>
                ${imageHtml}
                <div class="story-text">${ch.content}</div>
            `;
            container.appendChild(chapterDiv);
            
            // 显示底部导航
            document.getElementById('bottomNav').style.display = 'flex';
            updateNavButtons();
            updateProgress((index + 1) / chapters.length * 100);
            
            // 滚动到顶部
            window.scrollTo(0, 0);
        }
        
        // 上一章
        function prevChapter() {
            if (currentChapter > 0) {
                showChapter(currentChapter - 1);
            }
        }
        
        // 下一章
        function nextChapter() {
            if (currentChapter < chapters.length - 1) {
                showChapter(currentChapter + 1);
            }
        }
        
        // 更新导航按钮状态
        function updateNavButtons() {
            document.getElementById('prevBtn').disabled = currentChapter === 0;
            document.getElementById('nextBtn').disabled = currentChapter === chapters.length - 1;
            document.getElementById('chapterIndicator').textContent = `${currentChapter + 1} / ${chapters.length}`;
        }
        
        // 更新进度条
        function updateProgress(percent) {
            document.getElementById('progress').style.width = percent + '%';
        }
        
        // 切换侧边栏
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.querySelector('.overlay').classList.toggle('active');
        }
        
        // 显示人物介绍
        function showCharacter(name) {
            const char = characters[name];
            if (char) {
                document.getElementById('charAvatar').textContent = char.avatar;
                document.getElementById('charName').textContent = name;
                document.getElementById('charDesc').textContent = char.desc;
                document.getElementById('characterModal').classList.add('active');
            }
        }
        
        // 关闭人物介绍
        function closeCharacter() {
            document.getElementById('characterModal').classList.remove('active');
        }
    </script>
</body>
</html>
