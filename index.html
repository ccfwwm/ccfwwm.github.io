<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西游记 - 儿童故事</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --fs: 18px; --bg: linear-gradient(135deg, #1a1a2e, #16213e); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Serif SC', 'ZCOOL KuaiLe', serif; background: var(--bg); color: #ecf0f1; min-height: 100vh; overflow-x: hidden; font-size: var(--fs); line-height: 1.8; }
        .container { max-width: 700px; margin: 0 auto; padding: 20px; padding-top: 80px; padding-bottom: 100px; }
        .header { position: fixed; top: 0; left: 0; right: 0; background: rgba(0,0,0,0.9); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .logo { font-size: 1.3rem; color: #f39c12; text-decoration: none; }
        .header-btns { display: flex; gap: 10px; }
        .header-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 8px 12px; border-radius: 15px; cursor: pointer; font-size: 0.9rem; }
        .menu-btn { background: none; border: none; color: #fff; font-size: 1.3rem; cursor: pointer; }
        .cover { text-align: center; padding: 80px 20px; }
        .cover h1 { font-size: 2.5rem; color: #f39c12; margin-bottom: 20px; }
        .cover-img { font-size: 70px; margin: 30px 0; animation: bounce 2s infinite; }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-15px)} }
        .start-btn { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; padding: 15px 40px; border-radius: 50px; font-size: 1.2rem; border: none; cursor: pointer; margin-top: 20px; }
        .chapter { display: none; animation: fadeIn 0.5s; }
        .chapter.active { display: block; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .chapter h2 { color: #f39c12; text-align: center; margin: 20px 0; font-size: 1.4em; }
        .chapter-img { font-size: 50px; text-align: center; margin: 15px 0; }
        .story { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 15px; }
        .story p { margin-bottom: 18px; text-indent: 2em; }
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.9); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .nav button { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-size: 1rem; }
        .nav button:disabled { opacity: 0.3; }
        .nav button:hover:not(:disabled) { background: #e74c3c; }
        .nav-center { flex: 1; text-align: center; color: rgba(255,255,255,0.7); }
        .sidebar { position: fixed; top: 0; right: -320px; width: 320px; height: 100vh; background: rgba(0,0,0,0.95); z-index: 200; overflow-y: auto; transition: right 0.3s; padding-top: 60px; }
        .sidebar.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 150; opacity: 0; visibility: hidden; transition: 0.3s; }
        .overlay.active { opacity: 1; visibility: visible; }
        .chapter-list { list-style: none; padding: 10px; }
        .chapter-list li { padding: 14px; margin: 5px 0; background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; }
        .chapter-list li:hover { background: #e74c3c; }
        .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 500; font-size: 1.5rem; }
        .loading.hidden { display: none; }
        .progress { position: fixed; top: 0; left: 0; height: 3px; background: #f39c12; transition: width 0.3s; z-index: 300; }
        .info { color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-top: 15px; }
        .font-panel { position: fixed; top: 60px; right: 10px; background: rgba(0,0,0,0.9); padding: 15px; border-radius: 10px; z-index: 200; display: none; }
        .font-panel.active { display: block; }
        .font-panel button { display: block; width: 100%; margin: 5px 0; padding: 8px 15px; background: rgba(255,255,255,0.2); border: none; color: #fff; border-radius: 5px; cursor: pointer; }
        .font-panel button:hover { background: #e74c3c; }
        @media (max-width: 600px) { .cover h1 { font-size: 2rem; } .story { padding: 15px; } }
    </style>
</head>
<body>
    <div class="loading" id="loading">🐵 加载中...</div>
    <div class="progress" id="progress"></div>
    
    <header class="header">
        <a href="#" class="logo" onclick="showCover()">🏠 西游记</a>
        <div class="header-btns">
            <button class="header-btn" onclick="toggleFont()">字</button>
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        </div>
    </header>
    
    <div class="font-panel" id="fontPanel">
        <button onclick="setFontSize(14)">小号 (14px)</button>
        <button onclick="setFontSize(18)">中号 (18px)</button>
        <button onclick="setFontSize(22)">大号 (22px)</button>
        <button onclick="setFontSize(26)">特大 (26px)</button>
    </div>
    
    <div class="overlay" onclick="toggleSidebar()"></div>
    <aside class="sidebar" id="sidebar">
        <ul class="chapter-list" id="chapterList"></ul>
    </aside>
    
    <div class="container">
        <div class="cover" id="cover">
            <h1>🐒 西游记</h1>
            <p>儿童经典故事</p>
            <div class="cover-img">🏰</div>
            <p>九九八十一难<br>西天取经传奇</p>
            <p class="info">共1章 · 点击章节目录阅读</p>
            <button class="start-btn" onclick="startReading()">开始阅读 📖</button>
        </div>
        <div id="chapterContent"></div>
    </div>
    
    <nav class="nav" id="nav" style="display:none;">
        <button id="prevBtn" onclick="prevChapter()">← 上一章</button>
        <span class="nav-center" id="indicator">1/1</span>
        <button id="nextBtn" onclick="nextChapter()">下一章 →</button>
    </nav>

    <script>
    // 章节索引 - 轻量
    const chapters = [
        {id:1,title:"第一回",subtitle:"灵根孕育源流出",img:"🐒"}
    ];
    
    let current = 0;
    let contentCache = {};
    
    // 加载章节内容
    async function loadChapter(id) {
        if (contentCache[id]) return contentCache[id];
        try {
            const resp = await fetch('chapters/' + id + '.json?v=' + Date.now());
            if (!resp.ok) throw new Error('Network error');
            const data = await resp.json();
            contentCache[id] = data[0];
            return contentCache[id];
        } catch(e) {
            console.error('Load error:', e);
            return {title:'第'+id+'回',content:'<p style="text-align:center;padding:20px;">⚠️ 加载失败，请刷新页面重试</p>'};
        }
    }
    
    function init() {
        renderList();
        document.getElementById('loading').classList.add('hidden');
    }
    
    function renderList() {
        const list = document.getElementById('chapterList');
        chapters.forEach((ch,i) => {
            const li = document.createElement('li');
            li.innerHTML = `<b>${i+1}.</b> ${ch.title} ${ch.subtitle}`;
            li.onclick = () => goChapter(i);
            list.appendChild(li);
        });
    }
    
    function showCover() {
        document.getElementById('cover').style.display = 'block';
        document.getElementById('chapterContent').innerHTML = '';
        document.getElementById('nav').style.display = 'none';
        toggleSidebar();
        current = 0;
        updateNav();
    }
    
    async function startReading() {
        current = 0;
        await showChapter(0);
    }
    
    async function goChapter(i) {
        toggleSidebar();
        await showChapter(i);
    }
    
    async function showChapter(i) {
        if(i<0||i>=chapters.length) return;
        current = i;
        document.getElementById('cover').style.display = 'none';
        document.getElementById('chapterContent').innerHTML = '<div style="text-align:center;padding:50px;">⏳ 加载中...</div>';
        document.getElementById('nav').style.display = 'flex';
        
        const ch = chapters[i];
        const data = await loadChapter(i+1);
        
        const html = `<div class="chapter active">
            <h2>${data.title || ch.title} ${data.subtitle || ch.subtitle}</h2>
            <div class="chapter-img">${data.img || ch.img}</div>
            <div class="story">${data.content}</div>
        </div>`;
        document.getElementById('chapterContent').innerHTML = html;
        
        updateNav();
        window.scrollTo(0,0);
    }
    
    function prevChapter() { showChapter(current-1); }
    function nextChapter() { showChapter(current+1); }
    
    function updateNav() {
        document.getElementById('prevBtn').disabled = current===0;
        document.getElementById('nextBtn').disabled = current===chapters.length-1;
        document.getElementById('indicator').textContent = `1/1`;
        document.getElementById('progress').style.width = `100%`;
    }
    
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
        document.querySelector('.overlay').classList.toggle('active');
    }
    
    function toggleFont() {
        document.getElementById('fontPanel').classList.toggle('active');
    }
    
    function setFontSize(size) {
        document.documentElement.style.setProperty('--fs', size + 'px');
        localStorage.setItem('fontSize', size);
    }
    
    // 读取保存的字体大小
    const savedSize = localStorage.getItem('fontSize');
    if(savedSize) setFontSize(parseInt(savedSize));
    else setFontSize(22); // 默认大号
    
    document.addEventListener('DOMContentLoaded',init);
    </script>
</body>
</html>
